<!DOCTYPE html>
<html>
    <head>
        <title>Game profile</title>
        <style>
            body {

font-family: Arial, sans-serif;

background: aliceblue;

text-align: center;

padding: 30px;

}

h1 {

color: navy;

}

button {

background: navy;

color: white;

padding: 10px 25px;

border: none;

border-radius: 20px;

cursor: pointer;

}

div {

border: 1px solid navy;

width: 280px;

margin: 6px auto;

padding: 8px 12px;

text-align: left;

border-radius: 6px;}
        </style>
    </head>
    <body>
        <h1>Game profile</h1>
        <button onclick="showProfile()">Show Profile</button>
        <div>Name <span id="name"></span></div>
        <div>Score <span id="score"></span></div>
        <div>Top Score <span id="record"></span></div>
        <div>Rank <span id="rank"></span></div>
        <div>Greeting <span id="greeting"></span></div>
        <div>Bonus level <span id="bonus"></span></div>
        <div>Team Name <span id="team"></span></div>
        <script>
            function showProfile() {
                let name = "Debra";
                let myScore = 1500;
                let record = 2000;
                let bonus = null;
                let team ;
                 
                let isTopScore = myScore == record;

                let rank;
                if (myScore >= 2000) {
                    rank = "Diamond";
                } else if (myScore >= 1500) {
                    rank = "Gold";
                } else if (myScore >= 1000) {
                    rank = "Silver";
                } else {
                    rank = "Bronze";
                }

                let hour = new Date().getHours();
                let greeting;
                if (hour < 12) {
                    greeting = "Good morning!";
                } else if (hour < 15) {
                    greeting = "Good afternoon!";
                } else {
                    greeting = "Good evening!";
                }

                document.getElementById("name").innerHTML= name;
                document.getElementById("score").innerHTML = myScore; 
                document.getElementById("record").innerHTML = record;
                document.getElementById("rank").innerHTML = rank;
                document.getElementById("greeting").innerHTML = greeting;
            }
        </script>
    </body>
</html>
